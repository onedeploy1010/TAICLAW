<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3B3B"/>
      <stop offset="100%" stop-color="#D10A1A"/>
    </linearGradient>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(212,175,55,0.20)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="216" height="216" rx="42" fill="#070709"/>
  <rect x="20" y="20" width="216" height="216" rx="42" fill="url(#grid)" opacity="0.35"/>

  <!-- Shield outline -->
  <path
    d="M128 34
       L184 60
       L184 140
       C184 190 154 214 128 222
       C102 214 72 190 72 140
       L72 60
       Z"
    fill="rgba(255,255,255,0.02)"
    stroke="url(#gold)"
    stroke-width="10"
    filter="url(#glowGold)"
  />

  <!-- Tech circuitry accents -->
  <path d="M96 92H160" stroke="rgba(212,175,55,0.55)" stroke-width="6" stroke-linecap="round"/>
  <path d="M120 92V70" stroke="url(#red)" stroke-width="6" stroke-linecap="round"/>
  <path d="M88 150H168" stroke="rgba(212,175,55,0.35)" stroke-width="4" stroke-linecap="round"/>

  <!-- Monogram: stylized "T" and "A" (no text) -->
  <!-- T -->
  <path d="M104 86H152" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
  <path d="M128 86V54" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>

  <!-- A -->
  <path d="M116 168L128 124L140 168" fill="none" stroke="url(#red)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M110 150H146" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="128" cy="54" r="7" fill="#D4AF37"/>
  <circle cx="128" cy="124" r="6" fill="#FF3B3B"/>
  <circle cx="110" cy="150" r="5" fill="#D4AF37"/>
  <circle cx="146" cy="150" r="5" fill="#D4AF37"/>
</svg>

