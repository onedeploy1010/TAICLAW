<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070709"/>
      <stop offset="55%" style="stop-color:#0b0508"/>
      <stop offset="100%" style="stop-color:#070709"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD166"/>
      <stop offset="55%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B3B"/>
      <stop offset="100%" style="stop-color:#D10A1A"/>
    </linearGradient>
    <radialGradient id="glowRed1" cx="35%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(209,10,26,0.35)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glowGold2" cx="70%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.22)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowRed1)"/>
  <rect width="1200" height="630" fill="url(#glowGold2)"/>

  <!-- subtle circuit grid -->
  <g opacity="0.22" stroke="rgba(212,175,55,0.22)" stroke-width="1">
    <path d="M0 90H1200" />
    <path d="M0 165H1200" />
    <path d="M0 240H1200" />
    <path d="M0 315H1200" />
    <path d="M0 390H1200" />
    <path d="M0 465H1200" />
    <path d="M0 540H1200" />
    <path d="M85 0V630" />
    <path d="M170 0V630" />
    <path d="M255 0V630" />
    <path d="M340 0V630" />
    <path d="M425 0V630" />
    <path d="M510 0V630" />
    <path d="M595 0V630" />
    <path d="M680 0V630" />
    <path d="M765 0V630" />
    <path d="M850 0V630" />
    <path d="M935 0V630" />
    <path d="M1020 0V630" />
    <path d="M1105 0V630" />
  </g>

  <!-- Center monogram shield -->
  <g transform="translate(600 315)">
    <!-- shield -->
    <path
      d="M0 -238
         L164 -154
         L164 12
         C164 120 74 184 0 206
         C-74 184 -164 120 -164 12
         L-164 -154
         Z"
      fill="rgba(255,255,255,0.02)"
      stroke="url(#gold)"
      stroke-width="18"
      stroke-linejoin="round"
    />

    <!-- T -->
    <path d="M-70 -60H70" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
    <path d="M0 -60V-155" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>

    <!-- A -->
    <path d="M-68 40L0 -60L68 40" fill="none" stroke="url(#red)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-46 12H46" fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>

    <!-- circuitry lines -->
    <path d="M-110 -120H110" stroke="rgba(212,175,55,0.55)" stroke-width="10" stroke-linecap="round"/>
    <path d="M-90 95H90" stroke="rgba(212,175,55,0.30)" stroke-width="8" stroke-linecap="round"/>

    <!-- nodes -->
    <circle cx="0" cy="-155" r="12" fill="#D4AF37"/>
    <circle cx="0" cy="-60" r="10" fill="#FF3B3B"/>
    <circle cx="-46" cy="12" r="9" fill="#D4AF37"/>
    <circle cx="46" cy="12" r="9" fill="#D4AF37"/>
  </g>
</svg>
