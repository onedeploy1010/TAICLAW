<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b0e"/>
      <stop offset="50%" style="stop-color:#0a1f1e"/>
      <stop offset="100%" style="stop-color:#080b0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0abab5"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(10,186,181,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:rgba(52,211,153,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Logo icon -->
  <rect x="520" y="140" width="70" height="70" rx="18" fill="url(#accent)" opacity="0.9"/>
  <text x="555" y="192" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle">C</text>
  <!-- Brand name -->
  <text x="600" y="280" font-family="Arial,sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle" letter-spacing="6">
    Coin<tspan fill="#0abab5">Max</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">
    Smart Crypto Investment Platform
  </text>
  <!-- Feature pills -->
  <rect x="270" y="390" width="140" height="40" rx="20" fill="rgba(10,186,181,0.12)" stroke="rgba(10,186,181,0.3)" stroke-width="1"/>
  <text x="340" y="416" font-family="Arial,sans-serif" font-size="15" fill="#81d8d0" text-anchor="middle" font-weight="600">Staking</text>
  <rect x="440" y="390" width="140" height="40" rx="20" fill="rgba(10,186,181,0.12)" stroke="rgba(10,186,181,0.3)" stroke-width="1"/>
  <text x="510" y="416" font-family="Arial,sans-serif" font-size="15" fill="#81d8d0" text-anchor="middle" font-weight="600">Daily Yield</text>
  <rect x="610" y="390" width="140" height="40" rx="20" fill="rgba(10,186,181,0.12)" stroke="rgba(10,186,181,0.3)" stroke-width="1"/>
  <text x="680" y="416" font-family="Arial,sans-serif" font-size="15" fill="#81d8d0" text-anchor="middle" font-weight="600">MA Token</text>
  <rect x="780" y="390" width="140" height="40" rx="20" fill="rgba(10,186,181,0.12)" stroke="rgba(10,186,181,0.3)" stroke-width="1"/>
  <text x="850" y="416" font-family="Arial,sans-serif" font-size="15" fill="#81d8d0" text-anchor="middle" font-weight="600">Node System</text>
  <!-- Bottom accent line -->
  <rect x="400" y="480" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <!-- URL -->
  <text x="600" y="530" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="3">axiom-x.xyz</text>
</svg>
