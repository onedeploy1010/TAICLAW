<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3B3B"/>
      <stop offset="100%" stop-color="#D10A1A"/>
    </linearGradient>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="rgba(212,175,55,0.20)" stroke-width="1"/>
    </pattern>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#070709"/>
  <rect width="64" height="64" rx="14" fill="url(#grid)" opacity="0.35"/>

  <!-- shield outline -->
  <path
    d="M32 10
       L46 17
       L46 39
       C46 47 40 52 32 54
       C24 52 18 47 18 39
       L18 17
       Z"
    fill="rgba(255,255,255,0.02)"
    stroke="url(#gold)"
    stroke-width="3.4"
    filter="url(#glowGold)"
  />

  <!-- circuitry accents -->
  <path d="M22 25H42" stroke="rgba(212,175,55,0.55)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M30 25V20" stroke="url(#red)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M24 39H40" stroke="rgba(212,175,55,0.35)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- monogram (T + A) -->
  <!-- T -->
  <path d="M24 23H40" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 23V16" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <!-- A -->
  <path d="M28 43L32 33L36 43" fill="none" stroke="url(#red)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M27 40H37" fill="none" stroke="url(#gold)" stroke-width="2.6" stroke-linecap="round"/>

  <!-- nodes -->
  <circle cx="32" cy="16" r="1.8" fill="#D4AF37"/>
  <circle cx="32" cy="33" r="1.6" fill="#FF3B3B"/>
  <circle cx="28.5" cy="40" r="1.4" fill="#D4AF37"/>
  <circle cx="35.5" cy="40" r="1.4" fill="#D4AF37"/>
</svg>
