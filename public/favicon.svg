<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(96,165,250,0.25)" stroke-width="1.5"/>

  <!-- subtle inner glow top -->
  <ellipse cx="32" cy="8" rx="22" ry="8" fill="rgba(59,130,246,0.12)"/>

  <!-- Q letter -->
  <!-- Circle of Q -->
  <circle cx="22" cy="32" r="11" fill="none" stroke="url(#blueGrad)" stroke-width="4.5" filter="url(#glow)"/>
  <!-- Q tail -->
  <line x1="29" y1="39" x2="34" y2="44" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- A letter -->
  <!-- Left leg of A -->
  <line x1="38" y1="44" x2="44" y2="22" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right leg of A -->
  <line x1="44" y1="22" x2="50" y2="44" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Crossbar of A -->
  <line x1="40" y1="36" x2="48" y2="36" stroke="url(#blueGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- bottom accent bar -->
  <rect x="18" y="57" width="28" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
